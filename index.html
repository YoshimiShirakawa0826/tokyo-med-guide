<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Med Guide</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Tokyo Med Guide</h1>
            <p>Find Medical Institutions in Tokyo Quickly & Easily</p>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <div class="filter-group">
                <label>
                    <input type="checkbox" id="filter-emergency"> 
                    <span class="emergency-label">Emergency Only (Red)</span>
                </label>
                <label>
                    <input type="checkbox" id="filter-walkin"> 
                    Walk-in Allowed
                </label>
            </div>
            <div class="language-note">
                Language: English
            </div>
        </div>

        <div class="app-layout">
            <div id="map" class="map-container"></div>
            
            <div class="hospital-list-container">
                <h2>Medical Institutions</h2>
                <div id="hospital-list" class="hospital-list">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
